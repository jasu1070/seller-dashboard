@if (isVisible()) {
  <div class="bg-indigo-50 border-l-4 border-indigo-500 text-indigo-700 p-4 rounded-md flex justify-between items-center shadow-sm">
    <div class="flex items-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <div>
        <p class="font-bold">Important Update</p>
        <p class="text-sm">Our new payment policy will be effective from next week. Please review the changes.</p>
      </div>
    </div>
    <button (click)="dismiss()" class="p-1 rounded-full hover:bg-indigo-100">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>
}
