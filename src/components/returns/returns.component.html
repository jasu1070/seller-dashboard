<div class="bg-white rounded-lg border border-gray-200 shadow-md">
  <div class="p-4 border-b border-gray-200">
    <h3 class="text-lg font-semibold text-gray-800">Return Requests</h3>
  </div>
  <div class="overflow-x-auto">
    <table class="w-full">
      <thead>
        <tr class="text-left text-xs font-semibold text-gray-500 uppercase bg-gray-50">
          <th class="px-4 py-2">Return ID</th>
          <th class="px-4 py-2">Order ID</th>
          <th class="px-4 py-2">Customer</th>
          <th class="px-4 py-2">Date</th>
          <th class="px-4 py-2">Reason</th>
          <th class="px-4 py-2">Status</th>
          <th class="px-4 py-2">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200">
        @for (item of returns(); track item.id) {
          <tr class="hover:bg-gray-50 text-sm">
            <td class="px-4 py-2 whitespace-nowrap font-medium text-gray-800">{{ item.id }}</td>
            <td class="px-4 py-2 whitespace-nowrap text-brand-primary hover:underline cursor-pointer">{{ item.orderId }}</td>
            <td class="px-4 py-2 whitespace-nowrap text-gray-800">{{ item.customerName }}</td>
            <td class="px-4 py-2 whitespace-nowrap text-gray-600">{{ item.date }}</td>
            <td class="px-4 py-2 whitespace-nowrap text-gray-600">{{ item.reason }}</td>
            <td class="px-4 py-2 whitespace-nowrap">
              <span class="px-2 py-1 text-xs font-semibold rounded-full" [class]="getStatusClass(item.status)">
                {{ item.status }}
              </span>
            </td>
            <td class="px-4 py-2 whitespace-nowrap">
                <a href="#" class="text-brand-primary hover:text-brand-secondary font-medium">Details</a>
            </td>
          </tr>
        } @empty {
          <tr><td colspan="7" class="text-center p-8 text-gray-500">No returns found.</td></tr>
        }
      </tbody>
    </table>
  </div>
</div>
