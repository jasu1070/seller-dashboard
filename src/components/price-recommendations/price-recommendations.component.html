<div class="bg-white rounded-lg border border-gray-200 shadow-md">
    <div class="p-4 border-b border-gray-200 flex justify-between items-center">
        <h3 class="text-lg font-semibold text-gray-800">Price Recommendations</h3>
        <p class="text-sm text-gray-500">Optimize your pricing to increase sales and profit.</p>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead>
          <tr class="text-left text-xs font-semibold text-gray-500 uppercase bg-gray-50">
            <th class="px-4 py-2">Product</th>
            <th class="px-4 py-2">Current Price</th>
            <th class="px-4 py-2">Recommended Price</th>
            <th class="px-4 py-2">Est. Sales Lift</th>
            <th class="px-4 py-2">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">
           @for (i of [1,2,3,4]; track i) {
            <tr class="hover:bg-gray-50 text-sm text-gray-700">
              <td class="px-4 py-3 whitespace-nowrap">Premium Wireless Headphones</td>
              <td class="px-4 py-3 whitespace-nowrap">$199.99</td>
              <td class="px-4 py-3 whitespace-nowrap font-semibold text-green-600">$189.99</td>
              <td class="px-4 py-3 whitespace-nowrap font-semibold text-green-600">+15%</td>
              <td class="px-4 py-3 whitespace-nowrap">
                <button class="px-3 py-1 text-xs font-medium rounded-md bg-green-500 text-white hover:bg-green-600">Accept</button>
              </td>
            </tr>
           }
        </tbody>
      </table>
    </div>
</div>
