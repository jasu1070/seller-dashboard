<div class="bg-white rounded-lg border border-gray-200 shadow-md">
  <div class="p-4 border-b border-gray-200 flex justify-between items-center">
    <h3 class="text-lg font-semibold text-gray-800">Product Listings</h3>
    <button (click)="openAddModal()" class="px-4 py-2 text-sm font-medium rounded-md bg-brand-primary text-white hover:bg-brand-secondary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-primary transition-colors">
      Add Product
    </button>
  </div>
  <div class="overflow-x-auto">
    <table class="w-full">
      <thead>
        <tr class="text-left text-xs font-semibold text-gray-500 uppercase bg-gray-50">
          <th class="px-4 py-2">Product</th>
          <th class="px-4 py-2">SKU</th>
          <th class="px-4 py-2">Price</th>
          <th class="px-4 py-2">Stock</th>
          <th class="px-4 py-2">Status</th>
          <th class="px-4 py-2">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200">
        @for (product of products(); track product.id) {
          <tr class="hover:bg-gray-50 text-sm text-gray-700">
            <td class="px-4 py-2 whitespace-nowrap">
              <div class="flex items-center">
                <div class="flex-shrink-0 h-10 w-10">
                  <img class="h-10 w-10 rounded-md object-cover" [src]="product.imageUrl" alt="">
                </div>
                <div class="ml-3">
                  <div class="font-medium text-gray-900">{{ product.name }}</div>
                </div>
              </div>
            </td>
            <td class="px-4 py-2 whitespace-nowrap">{{ product.sku }}</td>
            <td class="px-4 py-2 whitespace-nowrap">${{ product.price.toFixed(2) }}</td>
            <td class="px-4 py-2 whitespace-nowrap font-medium" [class]="product.stock > 0 ? 'text-gray-800' : 'text-red-600'">
              {{ product.stock > 0 ? product.stock : 'Out of Stock' }}
            </td>
            <td class="px-4 py-2 whitespace-nowrap">
              <span class="px-2 py-1 text-xs font-semibold rounded-full" [class]="getStatusClass(product.status)">
                {{ product.status }}
              </span>
            </td>
            <td class="px-4 py-2 whitespace-nowrap font-medium">
              <a (click)="openEditModal(product)" class="text-brand-primary hover:text-brand-secondary cursor-pointer">Edit</a>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>

@if(isModalOpen()) {
  <app-add-product-modal 
    [product]="editingProduct()" 
    (close)="closeModal()" 
    (save)="handleProductSave($event)">
  </app-add-product-modal>
}
