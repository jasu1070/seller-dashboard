<div class="bg-white p-6 rounded-lg border border-gray-200 shadow-md h-full">
  <div class="flex justify-between items-center mb-4">
    <div>
      <h3 class="text-lg font-semibold text-gray-800">Weekly Sales</h3>
      <p class="text-sm text-gray-500">Sales summary for the last 7 days</p>
    </div>
    <div class="flex items-center space-x-2">
      <button class="px-3 py-1 text-sm font-medium rounded-md border bg-gray-50 text-gray-700 hover:bg-gray-100">Export</button>
      <select class="border rounded-md py-1 px-2 text-sm focus:ring-brand-primary focus:border-brand-primary">
        <option>This Week</option>
        <option>Last Week</option>
      </select>
    </div>
  </div>
  <div class="h-64 flex items-end justify-around pt-4">
    @for (sale of salesData(); track sale.day) {
      <div class="flex flex-col items-center w-12">
        <div class="w-8 bg-indigo-200 rounded-t-md hover:bg-brand-primary transition-colors" [style.height]="getBarHeight(sale.amount)">
        </div>
        <span class="text-xs font-medium text-gray-500 mt-2">{{ sale.day }}</span>
      </div>
    }
  </div>
</div>
