<div class="bg-white p-6 rounded-lg border border-gray-200 shadow-md h-full">
  <div class="flex justify-between items-center">
    <div>
      <h3 class="text-lg font-semibold text-gray-800">Supplier Score</h3>
      <p class="text-sm text-gray-500">Your performance metrics</p>
    </div>
    <a href="#" (click)="$event.preventDefault()" class="text-sm font-medium text-brand-primary hover:text-brand-secondary">Details</a>
  </div>
  <div class="mt-4 space-y-4">
    @for (score of scores; track score.name) {
      <div>
        <div class="flex justify-between text-sm font-medium text-gray-700 mb-1">
          <span>{{ score.name }}</span>
          <span>{{ score.value }}{{ score.unit }}</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-2">
          <div class="h-2 rounded-full" [class]="getBarColor(score.value, score.target)" [style.width]="getBarWidth(score.value, score.target)"></div>
        </div>
        <div class="text-right text-xs text-gray-500 mt-1">Target: {{score.target}}{{score.unit}}</div>
      </div>
    }
  </div>
</div>
