<div class="bg-white rounded-lg border border-gray-200 shadow-md">
  <div class="p-4 border-b border-gray-200 flex justify-between items-center">
    <h3 class="text-lg font-semibold text-gray-800">Recent Orders</h3>
    <a href="#" (click)="$event.preventDefault()" class="text-sm font-medium text-brand-primary hover:text-brand-secondary">View All</a>
  </div>
  <div class="overflow-x-auto">
    <table class="w-full">
      <thead>
        <tr class="text-left text-xs font-semibold text-gray-500 uppercase bg-gray-50">
          <th class="px-4 py-2">Order ID</th>
          <th class="px-4 py-2">Customer</th>
          <th class="px-4 py-2">Date</th>
          <th class="px-4 py-2">Amount</th>
          <th class="px-4 py-2">Status</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200">
        @for (order of recentOrders(); track order.id) {
          <tr class="hover:bg-gray-50 text-sm text-gray-700">
            <td class="px-4 py-3 whitespace-nowrap font-medium text-brand-primary cursor-pointer hover:underline">{{ order.id }}</td>
            <td class="px-4 py-3 whitespace-nowrap">{{ order.customerName }}</td>
            <td class="px-4 py-3 whitespace-nowrap text-gray-600">{{ order.date }}</td>
            <td class="px-4 py-3 whitespace-nowrap text-gray-600">${{ order.amount.toFixed(2) }}</td>
            <td class="px-4 py-3 whitespace-nowrap">
              <span class="px-2 py-1 text-xs font-semibold rounded-full" [class]="getStatusClass(order.status)">
                {{ order.status }}
              </span>
            </td>
          </tr>
        } @empty {
          <tr><td colspan="5" class="text-center p-8 text-gray-500">No recent orders.</td></tr>
        }
      </tbody>
    </table>
  </div>
</div>
