<div class="bg-white rounded-lg border border-gray-200 shadow-md">
    <div class="p-4 border-b border-gray-200">
        <h3 class="text-lg font-semibold text-gray-800">Recommended Products for You</h3>
        <p class="text-sm text-gray-500">Based on current trends and your sales history.</p>
    </div>
    <div class="p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        @for (i of [1,2,3,4]; track i) {
            <div class="rounded-lg border border-gray-200 overflow-hidden">
                <img src="https://picsum.photos/seed/rec{{i}}/400/300" alt="Product Image" class="w-full h-40 object-cover">
                <div class="p-4">
                    <h4 class="font-semibold text-gray-800">Trending Product {{i}}</h4>
                    <p class="text-sm text-gray-500 mt-1">High demand in your category.</p>
                    <button class="mt-3 w-full px-3 py-2 text-sm font-medium rounded-md bg-indigo-50 text-brand-primary hover:bg-indigo-100 transition-colors">
                        View Details
                    </button>
                </div>
            </div>
        }
    </div>
</div>
